<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - Gemini & Hugging Face</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        }
        
        .loader {
            display: inline-flex;
            gap: 4px;
        }
        
        .loader-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #94a3b8;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .loader-dot:nth-child(1) {
            animation-delay: -0.32s;
        }
        
        .loader-dot:nth-child(2) {
            animation-delay: -0.16s;
        }
        
        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.5;
                transform: scale(0.8);
            }
            40% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useRef, useEffect } = React;

        function AIChat() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [apiKey, setApiKey] = useState('');
            const [apiType, setApiType] = useState('gemini');
            const [apiConfigured, setApiConfigured] = useState(false);
            const [error, setError] = useState('');
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                if (messagesEndRef.current) {
                    messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const handleConfigureAPI = () => {
                if (!apiKey.trim()) {
                    setError('Please enter an API key');
                    return;
                }
                setApiConfigured(true);
                setError('');
            };

            const sendMessageToGemini = async (userMessage) => {
                try {
                    const urlWithKey = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                    
                    const response = await fetch(urlWithKey, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            contents: [
                                {
                                    parts: [
                                        {
                                            text: userMessage
                                        }
                                    ]
                                }
                            ],
                            generationConfig: {
                                temperature: 0.7,
                                maxOutputTokens: 1024,
                            }
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || 'Failed to get response from Gemini');
                    }

                    const data = await response.json();
                    const aiMessage = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response received';
                    return aiMessage;
                } catch (err) {
                    throw new Error(`Gemini API error: ${err.message}`);
                }
            };

            const sendMessageToHuggingFace = async (userMessage) => {
                try {
                    const response = await fetch(
                        'https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.1',
                        {
                            headers: { Authorization: `Bearer ${apiKey}` },
                            method: 'POST',
                            body: JSON.stringify({ inputs: userMessage }),
                        }
                    );

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error || 'Failed to get response from Hugging Face');
                    }

                    const data = await response.json();
                    
                    if (Array.isArray(data) && data[0]?.generated_text) {
                        let aiMessage = data[0].generated_text;
                        aiMessage = aiMessage.replace(userMessage, '').trim();
                        return aiMessage || 'No response received';
                    }
                    
                    throw new Error('Unexpected response format from Hugging Face');
                } catch (err) {
                    throw new Error(`Hugging Face API error: ${err.message}`);
                }
            };

            const handleSendMessage = async (e) => {
                e.preventDefault();
                
                if (!input.trim()) return;

                const userMessage = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMessage }]);
                setLoading(true);
                setError('');

                try {
                    let aiMessage;
                    
                    if (apiType === 'gemini') {
                        aiMessage = await sendMessageToGemini(userMessage);
                    } else {
                        aiMessage = await sendMessageToHuggingFace(userMessage);
                    }

                    setMessages(prev => [...prev, { role: 'assistant', content: aiMessage }]);
                } catch (err) {
                    setError(err.message);
                    setMessages(prev => [
                        ...prev,
                        { role: 'assistant', content: `Error: ${err.message}` }
                    ]);
                } finally {
                    setLoading(false);
                }
            };

            if (!apiConfigured) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">
                        <div className="w-full max-w-md">
                            <div className="bg-slate-800/80 backdrop-blur-md border border-slate-700 rounded-2xl p-8 shadow-2xl">
                                <h1 className="text-2xl font-bold text-white mb-6">Configure AI</h1>

                                <div className="space-y-4 mb-6">
                                    <label className="block">
                                        <span className="text-sm font-medium text-slate-300 mb-2 block">Choose API Provider</span>
                                        <div className="flex gap-3">
                                            <button
                                                onClick={() => {
                                                    setApiType('gemini');
                                                    setError('');
                                                }}
                                                className={`flex-1 py-2 px-4 rounded-lg font-medium transition-all ${
                                                    apiType === 'gemini'
                                                        ? 'bg-cyan-500 text-white shadow-lg shadow-cyan-500/50'
                                                        : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                                }`}
                                            >
                                                Gemini
                                            </button>
                                            <button
                                                onClick={() => {
                                                    setApiType('huggingface');
                                                    setError('');
                                                }}
                                                className={`flex-1 py-2 px-4 rounded-lg font-medium transition-all ${
                                                    apiType === 'huggingface'
                                                        ? 'bg-cyan-500 text-white shadow-lg shadow-cyan-500/50'
                                                        : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                                }`}
                                            >
                                                HuggingFace
                                            </button>
                                        </div>
                                    </label>

                                    <label className="block">
                                        <span className="text-sm font-medium text-slate-300 mb-2 block">
                                            {apiType === 'gemini' ? 'Google Gemini API Key' : 'Hugging Face API Key'}
                                        </span>
                                        <input
                                            type="password"
                                            value={apiKey}
                                            onChange={(e) => setApiKey(e.target.value)}
                                            placeholder={apiType === 'gemini' ? 'Enter your Gemini API key' : 'Enter your HF token'}
                                            className="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-cyan-400 transition-colors"
                                        />
                                    </label>

                                    {apiType === 'gemini' && (
                                        <p className="text-xs text-slate-400">
                                            Get free API key: <a href="https://makersuite.google.com/app/apikey" target="_blank" rel="noopener noreferrer" className="text-cyan-400 hover:underline">makersuite.google.com</a>
                                        </p>
                                    )}
                                    {apiType === 'huggingface' && (
                                        <p className="text-xs text-slate-400">
                                            Get free token: <a href="https://huggingface.co/settings/tokens" target="_blank" rel="noopener noreferrer" className="text-cyan-400 hover:underline">huggingface.co/settings/tokens</a>
                                        </p>
                                    )}
                                </div>

                                {error && (
                                    <div className="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-sm text-red-400">
                                        ⚠️ {error}
                                    </div>
                                )}

                                <button
                                    onClick={handleConfigureAPI}
                                    className="w-full py-3 bg-cyan-500 hover:bg-cyan-600 text-white font-medium rounded-lg transition-all shadow-lg shadow-cyan-500/30"
                                >
                                    Start Chatting ✓
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
                    {/* Header */}
                    <div className="border-b border-slate-700 bg-slate-800/50 backdrop-blur-md p-4">
                        <div className="max-w-4xl mx-auto flex items-center justify-between">
                            <div>
                                <h1 className="text-xl font-bold text-white">AI Assistant</h1>
                                <p className="text-sm text-slate-400">{apiType === 'gemini' ? '⚡ Gemini' : '🤗 Hugging Face'}</p>
                            </div>
                            <button
                                onClick={() => {
                                    setApiConfigured(false);
                                    setMessages([]);
                                    setError('');
                                }}
                                className="px-4 py-2 text-slate-300 hover:text-white text-sm font-medium transition-colors"
                            >
                                Change API
                            </button>
                        </div>
                    </div>

                    {/* Messages */}
                    <div className="flex-1 overflow-y-auto p-4">
                        <div className="max-w-4xl mx-auto space-y-4">
                            {messages.length === 0 && (
                                <div className="h-full flex items-center justify-center">
                                    <div className="text-center">
                                        <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-gradient-to-br from-cyan-500 to-blue-500 flex items-center justify-center">
                                            <div className="text-2xl">💬</div>
                                        </div>
                                        <h2 className="text-xl font-semibold text-slate-200 mb-2">Start Chatting</h2>
                                        <p className="text-slate-400">Ask me anything!</p>
                                    </div>
                                </div>
                            )}

                            {messages.map((msg, idx) => (
                                <div
                                    key={idx}
                                    className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}
                                >
                                    <div
                                        className={`max-w-2xl px-4 py-3 rounded-2xl ${
                                            msg.role === 'user'
                                                ? 'bg-cyan-600 text-white rounded-br-none'
                                                : 'bg-slate-700 text-slate-100 rounded-bl-none border border-slate-600'
                                        }`}
                                    >
                                        <p className="text-sm leading-relaxed whitespace-pre-wrap">{msg.content}</p>
                                    </div>
                                </div>
                            ))}

                            {loading && (
                                <div className="flex justify-start">
                                    <div className="bg-slate-700 text-slate-100 px-4 py-3 rounded-2xl rounded-bl-none border border-slate-600">
                                        <div className="loader">
                                            <div className="loader-dot"></div>
                                            <div className="loader-dot"></div>
                                            <div className="loader-dot"></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div ref={messagesEndRef} />
                        </div>
                    </div>

                    {/* Input */}
                    <div className="border-t border-slate-700 bg-slate-800/50 backdrop-blur-md p-4">
                        <form onSubmit={handleSendMessage} className="max-w-4xl mx-auto">
                            <div className="flex gap-3">
                                <input
                                    type="text"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder="Type your message..."
                                    disabled={loading}
                                    className="flex-1 px-4 py-3 bg-slate-700 border border-slate-600 rounded-full text-white placeholder-slate-400 focus:outline-none focus:border-cyan-400 transition-colors disabled:opacity-50"
                                />
                                <button
                                    type="submit"
                                    disabled={loading || !input.trim()}
                                    className="px-6 py-3 bg-cyan-500 hover:bg-cyan-600 disabled:bg-slate-600 disabled:cursor-not-allowed text-white rounded-full transition-all shadow-lg shadow-cyan-500/30 font-medium flex-shrink-0"
                                >
                                    Send
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AIChat />);
    </script>
</body>
</html>
